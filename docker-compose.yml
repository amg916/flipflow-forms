version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: flipflow-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: flipflow
      POSTGRES_PASSWORD: flipflow_dev
      POSTGRES_DB: flipflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: flipflow-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
